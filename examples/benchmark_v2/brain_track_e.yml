# ═══════════════════════════════════════════════════════════════════════
# Benchmark v2 — Track E: Longitudinal Learning Curve (Brain-Enabled)
# ═══════════════════════════════════════════════════════════════════════
#
# 50 sequential software architecture review tasks in the same domain.
# Each run:
#   1. task_reasoner  — LLM analyzes the architecture review task
#   2. brain_learn    — Learn from the analysis (accumulates skill)
#   3. brain_recall   — Recall prior architecture knowledge
#   4. task_applier   — Apply with accumulated knowledge
#   5. brain_feedback — Record outcome
#   6. task_result    — Final output
#
# Measures whether brain-condition quality improves over the 50 runs
# as skills accumulate (learning curve), vs flat brainless performance.
# ═══════════════════════════════════════════════════════════════════════

orchestrator:
  id: bench-v2-brain-track-e
  strategy: sequential
  agents:
    - task_reasoner
    - brain_learn
    - brain_recall
    - task_applier
    - brain_feedback
    - task_result

agents:
  # ── Step 1: Reason about the arch review task ─────────────────────
  - id: task_reasoner
    type: local_llm
    prompt: |
      You are a senior software architect. Analyze this architecture review task.

      DOMAIN: software_architecture
      TASK: {{ input.task | default(input) }}

      Conduct a thorough analysis:
      1. Identify the key architectural concerns
      2. Evaluate against established principles (SOLID, DRY, KISS, etc.)
      3. Consider scalability, maintainability, and security implications
      4. Propose concrete improvements with trade-off analysis

      Return JSON with:
      - "domain": "software_architecture"
      - "task": brief task description
      - "response": your comprehensive architecture analysis
      - "steps": array of {"action": "...", "result": "expected outcome"}
      - "architectural_concerns": list of key concerns identified
      - "confidence": 0.0-1.0
      - "internal_reasoning": your analytical approach
    params:
      provider: lm_studio
      model_url: "http://localhost:1234"
      model: "openai/gpt-oss-20b"
      temperature: 0.3

  # ── Step 2: Learn from this analysis ──────────────────────────────
  - id: brain_learn
    type: brain
    operation: learn
    prompt: "{{ previous_outputs.task_reasoner }}"

  # ── Step 3: Recall accumulated architecture knowledge ─────────────
  - id: brain_recall
    type: brain
    operation: recall
    prompt: "{{ previous_outputs.task_reasoner }}"

  # ── Step 4: Apply with accumulated knowledge ──────────────────────
  - id: task_applier
    type: local_llm
    prompt: |
      You are a senior software architect solving a review task. You have your
      own analysis AND accumulated knowledge from previous architecture reviews.

      DOMAIN: software_architecture
      TASK: {{ previous_outputs.task_reasoner.task | default(input) }}

      YOUR ANALYSIS:
      {{ previous_outputs.task_reasoner.response | default('No analysis') }}

      ACCUMULATED ARCHITECTURE KNOWLEDGE:
      Skill name: {{ previous_outputs.brain_recall.skill_name | default('No accumulated knowledge') }}
      Abstract steps: {{ previous_outputs.brain_recall.skill_steps | default([]) }}
      Transfer score: {{ previous_outputs.brain_recall.combined_score | default('N/A') }}
      Reasoning: {{ previous_outputs.brain_recall.internal_reasoning | default('First review — no prior patterns') }}

      INSTRUCTIONS:
      If prior architecture patterns were recalled, use them to enrich your review.
      Apply lessons from similar past reviews to catch issues you might otherwise miss.
      Note when prior experience improves your analysis.

      Return JSON with:
      - "response": your complete enhanced architecture review
      - "domain": "software_architecture"
      - "task": brief description
      - "steps": array of {"action": "...", "expected_outcome": "..."}
      - "used_recalled_skill": true or false
      - "recalled_skill_name": skill name or "none"
      - "improvements_from_experience": how prior knowledge improved this review
      - "confidence": 0.0-1.0
      - "internal_reasoning": reflection on how experience helped
    params:
      provider: lm_studio
      model_url: "http://localhost:1234"
      model: "openai/gpt-oss-20b"
      temperature: 0.3

  # ── Step 5: Record feedback ───────────────────────────────────────
  - id: brain_feedback
    type: brain
    operation: feedback
    prompt: "{{ previous_outputs.brain_recall }}"

  # ── Step 6: Final output ──────────────────────────────────────────
  - id: task_result
    type: local_llm
    prompt: |
      Produce the FINAL structured architecture review output.

      DOMAIN: software_architecture
      TASK: {{ previous_outputs.task_applier.task | default(input) }}
      SEQUENCE: {{ input.sequence | default(0) }}

      REVIEW:
      {{ previous_outputs.task_applier.response | default('No review') }}

      BRAIN METRICS:
      Skill recalled: {{ previous_outputs.brain_recall.skill_name | default('None') }}
      Transfer score: {{ previous_outputs.brain_recall.combined_score | default('N/A') }}
      Used prior knowledge: {{ previous_outputs.task_applier.used_recalled_skill | default(false) }}

      Return JSON with:
      - "response": comprehensive architecture review
      - "domain": "software_architecture"
      - "task": brief description
      - "sequence_number": {{ input.sequence | default(0) }}
      - "solution_steps": array of concrete review steps
      - "quality_self_assessment": 0.0-1.0 with justification
      - "brain_assisted": true if accumulated knowledge contributed
      - "recalled_skill": skill name or "none"
      - "confidence": 0.0-1.0
      - "internal_reasoning": final reflection
    params:
      provider: lm_studio
      model_url: "http://localhost:1234"
      model: "openai/gpt-oss-20b"
      temperature: 0.3
