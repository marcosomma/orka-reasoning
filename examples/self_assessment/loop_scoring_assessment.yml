# ═══════════════════════════════════════════════════════════════════════
# Self-Assessment — Loop Score Extraction (stabilized POC)
# ═══════════════════════════════════════════════════════════════════════
# Verifies the integrity of the whole system AND the loop-scoring fixes:
#   • a loop with an explicit `pattern` scoring strategy actually EXTRACTS the
#     score the inner agent emits (SCORE: x) — i.e. final_score is the parsed
#     value, not the fallback/timeout score;
#   • the loop terminates predictably (threshold or max_loops);
#   • execution invariants hold.
#
# Run:  ORKA_TIMEOUT_SECONDS=600 orka run \
#         examples/self_assessment/loop_scoring_assessment.yml "assess loop scoring"
# Requires: Redis (orka-start) + an OpenAI-compatible LLM at model_url.
# ═══════════════════════════════════════════════════════════════════════

orchestrator:
  id: loop-scoring-self-assessment
  strategy: sequential
  memory_preset: "working"
  agents:
    - scoring_loop
    - integrity_check
    - assessment_report

agents:
  - id: scoring_loop
    type: loop
    max_loops: 2
    score_threshold: 0.6
    fallback_score: 0.25      # distinct sentinel: if we see this, extraction FAILED
    timeout_score: 0.15
    persist_across_runs: false
    # Explicit, predictable extraction: parse "SCORE: <n>" from the scorer's response.
    score_extraction_config:
      strategies:
        - type: pattern
          patterns:
            - "SCORE:\\s*([0-9]+\\.?[0-9]*)"
    internal_workflow:
      orchestrator:
        id: internal
        strategy: sequential
        agents: [analyzer, scorer]
      agents:
        - id: analyzer
          type: local_llm
          model: openai/gpt-oss-20b
          model_url: http://localhost:1234
          provider: lm_studio
          temperature: 0.4
          timeout: 90
          prompt: |
            Briefly analyze this topic in 3-4 sentences: {{ get_input() }}
        - id: scorer
          type: local_llm
          model: openai/gpt-oss-20b
          model_url: http://localhost:1234
          provider: lm_studio
          temperature: 0.1
          timeout: 90
          prompt: |
            Rate the quality of the analysis below on a 0.0-1.0 scale.
            ANALYSIS: {{ previous_outputs.analyzer.response | default('') }}
            Respond with EXACTLY one line in this format and nothing else:
            SCORE: <number between 0.0 and 1.0>

  - id: integrity_check
    type: invariant_validator
    depends_on: scoring_loop
    prompt: |
      EXECUTION_DATA_JSON:
      {{ get_execution_artifacts(previous_outputs) | to_json_string }}
    params:
      max_depth: 50
      strict_tool_errors: false

  - id: assessment_report
    type: local_llm
    model: openai/gpt-oss-20b
    model_url: http://localhost:1234
    provider: lm_studio
    temperature: 0.1
    timeout: 120
    depends_on: integrity_check
    prompt: |
      You are auditing the loop score-extraction subsystem.

      LOOP RESULT:
      final_score: {{ previous_outputs.scoring_loop.final_score | default('MISSING') }}
      loops_completed: {{ previous_outputs.scoring_loop.loops_completed | default('MISSING') }}
      threshold_met: {{ previous_outputs.scoring_loop.threshold_met | default('MISSING') }}

      EXECUTION INTEGRITY:
      {{ previous_outputs.integrity_check.response | default(previous_outputs.integrity_check) }}

      Decide:
      1. score_extracted_ok: true if final_score is a number in [0,1] AND not exactly the
         fallback 0.25 / timeout 0.15 (i.e. the score was parsed from the agent, not a sentinel).
      2. loop_terminated_ok: true if loops_completed is between 1 and 2 inclusive.
      3. integrity_ok: true if invariant validation reports no violations.

      Return ONLY JSON:
      {
        "score_extracted_ok": true/false,
        "loop_terminated_ok": true/false,
        "integrity_ok": true/false,
        "overall": "PASS" or "FAIL",
        "evidence": "one sentence citing the final_score and loop count",
        "confidence": 0.0-1.0
      }
